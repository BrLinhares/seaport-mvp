# Deploy: seaport-frontend → Azure Static Web Apps

name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'seaport-frontend/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: seaport-frontend/package-lock.json

      - name: Install dependencies
        working-directory: seaport-frontend
        run: npm ci

      - name: Build with Vite
        working-directory: seaport-frontend
        run: npm run build
        env:
          VITE_API_URL: https://seaport-backend-a5b7ajathgd7gjfe.canadacentral-01.azurewebsites.net/api

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "seaport-frontend"
          output_location: "dist"
          skip_app_build: true
