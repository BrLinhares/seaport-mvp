# H2 em arquivo (dados persistem entre reinicializações)
spring.datasource.url=jdbc:h2:file:./data/seaportdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (acessível em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA — "update" mantém os dados e aplica só as mudanças novas no schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Email (MailHog para dev - docker-compose inclui)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Gerente master (criado automaticamente se banco vazio)
# Defina via variável de ambiente APP_ADMIN_PASSWORD ou altere aqui para dev local
app.admin.name=Administrador Seaport
app.admin.email=admin@seaport.com.br
app.admin.password=${APP_ADMIN_PASSWORD:SuaSenhaDevLocal@123}

# PDF — logo carregada do frontend em dev
app.pdf.logo-path=../seaport-frontend/public/logo-seaport.png

# Logging
logging.level.com.seaport=DEBUG
logging.level.org.springframework.security=DEBUG
