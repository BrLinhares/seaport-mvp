spring.application.name=seaport-backend

# Profile ativo (trocar para 'prod' no Azure)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:seaport-super-secret-key-change-in-production-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Password Reset Token (minutos)
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION:30}

# Frontend URL (para links de email)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Upload de documentos
app.storage.location=${APP_STORAGE_LOCATION:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
spring.servlet.multipart.enabled=true
