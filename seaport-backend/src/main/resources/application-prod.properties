# =======================
# PERFIL: PRODUÇÃO (AZURE)
# =======================

# ── Banco de dados ──────────────────────────────────────────────────────────
# Aceita SPRING_DATASOURCE_URL diretamente (Neon.tech, Railway, Supabase, etc.)
# ou as partes separadas DB_HOST / DB_PORT / DB_NAME
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:seaportdb}?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:seaport}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:seaport123}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false

# ── E-mail ──────────────────────────────────────────────────────────────────
# Para o MVP/demo: deixe as variáveis em branco para desabilitar e-mails.
# Configure MAIL_HOST, MAIL_USERNAME e MAIL_PASSWORD para ativar reset de senha.
spring.mail.host=${MAIL_HOST:smtp.placeholder.invalid}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# ── Uploads de arquivos ─────────────────────────────────────────────────────
# /home é persistente no Azure App Service (montado no Azure Storage)
app.storage.location=${APP_STORAGE_LOCATION:/home/uploads}

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.seaport=INFO
logging.level.org.springframework.security=WARN

# ── Actuator (health check do Azure) ────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false
